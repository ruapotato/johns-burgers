<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Johns Burgers - Sutherlin, OR</title>
<style>
:root { --brown: #6b3410; --cream: #fff7ea; --accent: #c2410c; }
* { box-sizing: border-box; }
body { margin: 0; font-family: Georgia, serif; background: var(--cream); color: var(--brown); line-height: 1.6; }
header { text-align: center; padding: 3rem 1rem 2rem; background: var(--brown); color: var(--cream); }
header img { max-width: 180px; height: auto; margin-bottom: 1rem; }
header h1 { margin: 0 0 0.25rem; font-size: 2.5rem; letter-spacing: 0.05em; }
header p { margin: 0; font-style: italic; opacity: 0.9; }
main { max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem; }
section { margin-bottom: 2rem; }
h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 0.25rem; }
.info-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px dashed #d4a574; }
.info-row:last-child { border-bottom: none; }
.label { font-weight: bold; }
footer { text-align: center; padding: 1.5rem; font-size: 0.85rem; color: var(--brown); opacity: 0.7; }
</style>
</head>
<body>
<header>
<img src="images/johns-burgers-logo.webp" alt="Johns Burgers logo">
<h1>Johns Burgers</h1>
<p>The most delectable burgers in Sutherlin</p>
</header>
<main>
<section>
<h2>About</h2>
<p>We sell burgers that are just the most delectable. Come by and see what all the fuss is about.</p>
</section>
<section>
<h2>Visit Us</h2>
<div class="info-row"><span class="label">Address</span><span>910 W Central Ave, Sutherlin, OR</span></div>
<div class="info-row"><span class="label">Hours</span><span>Mon-Fri, 9:00am - 5:00pm</span></div>
</section>
</main>
<footer>
&copy; Johns Burgers - Sutherlin, Oregon
</footer>
</body>
</html>
